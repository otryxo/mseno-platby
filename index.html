<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vyhledávání</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; }
    input { width: 100%; padding: 10px; font-size: 16px; margin: 10px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
    button { width: 100%; padding: 10px; font-size: 16px; background: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #45a049; }
    #vysledek { margin-top: 20px; padding: 16px; border-radius: 8px; display: none; line-height: 1.5; }
    .uspech { background: #e8f5e9; border: 1px solid #4CAF50; }
    .chyba { background: #ffebee; border: 1px solid #e53935; }
    .vysledek-tabulka { width: 100%; border-collapse: collapse; margin-bottom: 15px; background: white; }
    .vysledek-tabulka th, .vysledek-tabulka td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    .vysledek-tabulka th { background-color: #f2f2f2; width: 40%; }
    .qr-kod { display: block; margin-top: 15px; max-width: 100%; height: auto; }
  </style>
</head>
<body>

  <h2>Vyhledání částky k zaplacení za Mšeno (v2)</h2>
  <input type="tel" id="telefonInput" placeholder="Zadejte telefonní číslo">
  <button onclick="hledat()">Vyhledat</button>
  <div id="vysledek"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyUIZfCGJuKHSOwDcrWBAPTsiPu-OR4wyOIBkP0Nd7li3BHXFXxSSSHAxQYbm5cLt4lUw/exec";

    async function hledat() {
      const telefon = document.getElementById("telefonInput").value.trim();
      const div = document.getElementById("vysledek");

      if (!telefon) {
        div.style.display = "block";
        div.className = "chyba";
        div.innerHTML = "Zadejte prosím telefonní číslo.";
        return;
      }

      div.style.display = "block";
      div.className = "";
      div.innerHTML = "Hledám...";

      try {
        const res = await fetch(API_URL + "?telefon=" + encodeURIComponent(telefon));
        const data = await res.json();

        if (data.nalezeno) {
          div.className = "uspech";
          const tabulkaHtml = vytvorTabulku(data);
          div.innerHTML = `
            ${tabulkaHtml}
            Částku prosím zaplať na účet <strong>314335399/0300</strong>.<br>
            Do zprávy pro příjemce uveď své jméno.<br><br>
            <em>QR kód níže je nastaven na 1 Kč</em><br>
            <img src="qrdavid.png" class="qr-kod" alt="QR kód">
          `;
        } else {
          div.className = "chyba";
          div.innerHTML = "Telefonní číslo nebylo nalezeno.";
        }
      } catch (e) {
        div.className = "chyba";
        div.innerHTML = "Chyba při komunikaci se serverem.";
      }
    }

    function vytvorTabulku(data) {
      let html = '<table class="vysledek-tabulka">';
      for (const klic in data) {
        if (klic === 'nalezeno' || klic === 'hledalJsemPresne') continue;
        
        if (klic === 'celkem') {
          html += `<tr><th>${klic}</th><td style="color: darkred; font-weight: bold;">${data[klic]}</td></tr>`;
        } else {
          html += `<tr><th>${klic}</th><td>${data[klic]}</td></tr>`;
        }
      }
      html += '</table>';
      return html;
    }
  </script>
</body>
</html>
